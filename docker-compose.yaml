services:
  database:
    image: 'postgres:16-alpine'
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}' ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 5432:5432
    networks:
      - secnet

  redis:
    image: 'redis:7.4-alpine'
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"; else exec redis-server --appendonly yes; fi'
    environment:
      - REDIS_PASSWORD
    volumes:
      - redis-data:/data
    healthcheck:
      test: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG; else redis-cli ping | grep PONG; fi'
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - 6379:6379
    networks:
      - secnet

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SPRING_DOCKER_COMPOSE_ENABLED
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
      - SPRING_JPA_HIBERNATE_DDL_AUTO
      - SPRING_DATA_REDIS_URL
      - SPRING_DATA_REDIS_TIMEOUT
      - SPRING_DATA_REDIS_REPOSITORY_ENABLED
      - APP_JWT_SECRET
      - APP_JWT_ACCESS_TOKEN_TTL_MINUTES
      - APP_JWT_REFRESH_TOKEN_TTL_DAYS
      - APP_GOOGLE_CLIENT_ID
      - APP_GOOGLE_CLIENT_SECRET
      - APP_GOOGLE_ALLOWED_AUDIENCES
      - APP_CORS_ALLOWED_ORIGINS
      - APP_BOOTSTRAP_ADMIN_ENABLED
      - APP_BOOTSTRAP_ADMIN_USERNAME
      - APP_BOOTSTRAP_ADMIN_PASSWORD
      - APP_BOOTSTRAP_ADMIN_EMAIL
      - APP_BOOTSTRAP_ADMIN_MASTER_KEY_PUBLIC_KEY
      - APP_BOOTSTRAP_ADMIN_MASTER_KEY_ENCRYPTED_PRIVATE_KEY
      - APP_BOOTSTRAP_ADMIN_MASTER_KEY_PRIVATE_KEY_IV
      - APP_BOOTSTRAP_ADMIN_MASTER_KEY_PIN_SALT
      - APP_BOOTSTRAP_ADMIN_MASTER_KEY_KDF_PARAMS
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
    ports:
      - 8080:8080
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - secnet

volumes:
  postgres-data:
  redis-data:

networks:
  secnet:
