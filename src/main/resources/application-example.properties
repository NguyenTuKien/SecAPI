spring.application.name=mini-messenger
spring.docker.compose.enabled=true

server.port=8080

spring.datasource.url=jdbc:postgresql://database:5432/mini_messenger
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.data.redis.url=redis://redis:6379
spring.data.redis.timeout=3s
spring.data.redis.repositories.enabled=false

app.jwt.secret=CHANGE_ME_MINIMUM_32_BYTES_SECRET
app.jwt.access-token-ttl-minutes=15
app.jwt.refresh-token-ttl-days=30

# Hardcoded sample values
app.google.client-id=PASTE_YOUR_GOOGLE_CLIENT_ID_HERE
app.google.client-secret=PASTE_YOUR_GOOGLE_CLIENT_SECRET_HERE
app.google.allowed-audiences=PASTE_YOUR_GOOGLE_CLIENT_ID_HERE

app.cors.allowed-origins=*

app.bootstrap.admin.enabled=true
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin123456
app.bootstrap.admin.email=admin@local.dev
app.bootstrap.admin.master-key.public-key=PASTE_YOUR_PUBLIC_KEY_HERE
app.bootstrap.admin.master-key.encrypted-private-key=PASTE_YOUR_ENCRYPTED_PRIVATE_KEY_HERE
app.bootstrap.admin.master-key.private-key-iv=PASTE_YOUR_PRIVATE_KEY_IV_HERE
app.bootstrap.admin.master-key.pin-salt=PASTE_YOUR_PIN_SALT_HERE
app.bootstrap.admin.master-key.kdf-params={"algorithm":"PBKDF2","iterations":100000,"keyLength":256,"digest":"SHA-256","bootstrap":true}
